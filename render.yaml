services:
  - type: web
    name: astri-astro-engine
    runtime: python
    plan: free
    rootDir: astro-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: ASTRO_ENGINE_SECRET
        sync: false
